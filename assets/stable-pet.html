};

function dec(k){
    var b=SC[k];if(!b)return'';
    var raw=atob(b);var arr=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
    return new TextDecoder('utf-8').decode(arr);
}

var petLayer=document.createElement("div");petLayer.className="layer";petLayer.style.opacity="1";
W.appendChild(petLayer);
var activeKey=null;

function show(k){
    if(k===activeKey)return;
    var svg=dec(k);if(!svg)return;
    activeKey=k;
    petLayer.innerHTML=svg;
    var el=petLayer.querySelector("svg");
    if(el){el.setAttribute("width","100");el.setAttribute("height","100");el.style.pointerEvents="none"}
    petLayer.style.opacity="1";
    console.log("show:"+k);
}

// Eye tracking with RAF for smoothness
var eyeRaf=null;
var targetMx=0,targetMy=0,currentMx=0,currentMy=0;
function updateEyes(){
    var eyes=petLayer.querySelector("#eyes-js");
    var body=petLayer.querySelector("#body-js");
    var shadow=petLayer.querySelector("#shadow-js");
    // Disable SVG's own animations on eye elements
    if(eyes){eyes.style.animation="none"}
    if(body){body.style.animation="none"}
    if(shadow){shadow.style.animation="none"}
    // Smooth interpolation
    currentMx+=(targetMx-currentMx)*0.15;
    currentMy+=(targetMy-currentMy)*0.15;
    if(eyes)eyes.style.transform="translate("+currentMx*EYE_MAX+"px,"+currentMy*EYE_MAX+"px)";
    if(body)body.style.transform="translate("+currentMx*EYE_MAX*BODY_SCALE+"px,"+currentMy*EYE_MAX*BODY_SCALE+"px)";
    if(shadow)shadow.style.transform="translate("+currentMx*EYE_MAX*SHADOW_SHIFT+"px,"+Math.abs(currentMy)*EYE_MAX*SHADOW_STRETCH+"px)";
    eyeRaf=requestAnimationFrame(updateEyes);
}
function startEyeTracking(){targetMx=mx;targetMy=my;if(!eyeRaf)eyeRaf=requestAnimationFrame(updateEyes)}
function stopEyeTracking(){if(eyeRaf){cancelAnimationFrame(eyeRaf);eyeRaf=null}}

function clearTimers(){
    if(idleTmr){clearTimeout(idleTmr);idleTmr=null}
    if(returnTmr){clearTimeout(returnTmr);returnTmr=null}
}

// Return to idle after duration
function scheduleReturn(ms){
    if(returnTmr)clearTimeout(returnTmr);
    returnTmr=setTimeout(function(){if(cur==="idle")show("idle-follow")},ms);
}

// Sleep sequence: yawn(3.8s) -> doze(4s) -> collapse(6s) -> sleeping
function startSleepSequence(){
    clearTimers();
    idleTmr=setTimeout(function(){
        if(cur!=="idle"||dragging)return;
        show("idle-yawn");
        idleTmr=setTimeout(function(){
            if(cur!=="idle"||dragging)return;
            show("idle-doze");
            idleTmr=setTimeout(function(){
                if(cur!=="idle"||dragging)return;
                show("collapse-sleep");
                idleTmr=setTimeout(function(){
                    if(cur!=="idle"||dragging)return;
                    show("sleeping");
                    isSleeping=true;
                },6000);
            },4000);
        },3800);
    },60000); // 60s mouse idle before yawn
}

function startIdleCycle(){
    clearTimers();
    startSleepSequence();
}

// Set state from OpenClaw
function setState(e){
    console.log("setState:"+e);
    cur=e;clearTimers();isSleeping=false;pokeCount=0;
    stopEyeTracking();
    switch(e){
        case "idle":
            show("idle-follow");startIdleCycle();break;
        case "thinking":
            show("thinking");break;
        case "tool_call":
            show("working");break;
        case "success":
            show("success");scheduleReturn(4000);break;
        case "error":
            show("error");scheduleReturn(5000);break;
        case "user_message":
            show("alert");scheduleReturn(5000);break;
        default:
            show("idle-follow");startIdleCycle();
    }
}

// Wake up from sleep
function wakeUp(){
    if(isSleeping||activeKey==="idle-doze"||activeKey==="idle-yawn"||activeKey==="collapse-sleep"||activeKey==="sleeping"){
        isSleeping=false;
        show("wake");
        setTimeout(function(){show("idle-follow");startIdleCycle()},1500);
    }
}

// Mouse tracking
function onMove(px,py){
    mx=Math.max(-1,Math.min(1,(px-innerWidth/2)/(innerWidth/2)));
    my=Math.max(-1,Math.min(1,(py-innerHeight/2)/(innerHeight/2)));
    targetMx=mx;targetMy=my;
    if(cur!=="idle")return;
    wakeUp();
    startEyeTracking();
    // Reset sleep timer
    clearTimers();
    startSleepSequence();
}
document.addEventListener("mousemove",function(e){onMove(e.clientX,e.clientY)});

// Poke interaction
function onPoke(side){
    if(cur!=="idle")return;
    pokeCount++;
    if(pokeCount>=3){
        show("react-annoyed");pokeCount=0;
        scheduleReturn(3500);
    }else{
        show(side==="left"?"react-left":"react-right");
        scheduleReturn(2500);
    }
}

// Position
try{var s=localStorage.getItem("pp");if(s){var p=JSON.parse(s);cx=p.x;cy=p.y}else{cx=innerWidth-150;cy=innerHeight-150}}catch(e){cx=innerWidth-150;cy=innerHeight-150}
ox=cx;oy=cy;
W.style.transform="translate3d("+cx+"px,"+cy+"px,0)";

// Drag
var dragStartX=0,dragStartY=0;
function ds(e){
    var px,py;
    if(e.type==="touchstart"){px=e.touches[0].clientX;py=e.touches[0].clientY}else{px=e.clientX;py=e.clientY}
    if(e.target===W||W.contains(e.target)){
        dragStartX=px;dragStartY=py;
        dragging=true;ix=px-ox;iy=py-oy;W.classList.add("drag");
        clearTimers();show("drag");
    }
}
function dm(e){
    if(!dragging)return;e.preventDefault();
    var px,py;
    if(e.type==="touchmove"){px=e.touches[0].clientX;py=e.touches[0].clientY}else{px=e.clientX;py=e.clientY}
    cx=Math.max(0,Math.min(px-ix,innerWidth-120));cy=Math.max(0,Math.min(py-iy,innerHeight-120));
    ox=cx;oy=cy;
    requestAnimationFrame(function(){W.style.transform="translate3d("+cx+"px,"+cy+"px,0)"});
}
function de(e){
    if(!dragging)return;
    dragging=false;W.classList.remove("drag");
    try{localStorage.setItem("pp",JSON.stringify({x:cx,y:cy}))}catch(e){}
    // Check if it was a click (not a drag)
    var px,py;
    if(e.type==="touchend"){px=e.changedTouches[0].clientX;py=e.changedTouches[0].clientY}else{px=e.clientX;py=e.clientY}
    var dist=Math.sqrt(Math.pow(px-dragStartX,2)+Math.pow(py-dragStartY,2));
    if(dist<5){
        var side=px<cx+60?"left":"right";
        onPoke(side);
    }else{
        // Instant switch back to idle (no fade)
        cur="idle";isSleeping=false;
        show("idle-follow");
        startIdleCycle();
    }
}
document.addEventListener("mousedown",ds);document.addEventListener("mousemove",dm);document.addEventListener("mouseup",de);
document.addEventListener("touchstart",ds,{passive:false});document.addEventListener("touchmove",dm,{passive:false});document.addEventListener("touchend",de);

// WebSocket
function ws_conn(){
    var w=new WebSocket("ws://localhost:8001/ws");
    w.onopen=function(){document.getElementById("conn").className="on"};
    w.onmessage=function(e){console.log("ws:"+e.data);try{setState(JSON.parse(e.data).event)}catch(x){console.log("parse err",x)}};
    w.onclose=function(){document.getElementById("conn").className="";setTimeout(ws_conn,3000)};
}
show("idle-follow");startIdleCycle();ws_conn();
})();
</script>
